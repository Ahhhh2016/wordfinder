<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>单词唤醒</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      body {
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect } = React;

      const API_URL = `${window.location.origin}/api/chat`;
      const MODEL_NAME = "openai/gpt-4.1-mini";
      const SEARCH_HISTORY_KEY = "wordfinder-search-history";

      const SolidIcon = {
        Dictionary: ({ className = "w-5 h-5" }) => (
          <svg viewBox="0 0 24 24" fill="currentColor" className={className}>
            <path d="M6 2C4.895 2 4 2.895 4 4V20C4 21.105 4.895 22 6 22H18C19.105 22 20 21.105 20 20V4C20 2.895 19.105 2 18 2H6ZM14 2V9L11.5 7.5L9 9V2H14Z" />
          </svg>
        ),
        Sparkles: ({ className = "w-5 h-5" }) => (
          <svg viewBox="0 0 20 20" fill="currentColor" className={className}>
            <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
          </svg>
        ),
        Search: ({ className = "w-5 h-5" }) => (
          <svg viewBox="0 0 20 20" fill="currentColor" className={className}>
            <path
              fillRule="evenodd"
              d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z"
              clipRule="evenodd"
            />
          </svg>
        ),
        BookOpen: ({ className = "w-5 h-5" }) => (
          <svg viewBox="0 0 20 20" fill="currentColor" className={className}>
            <path d="M9 2H4a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2h5V2zm2 0v15h5a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2h-5z" />
          </svg>
        ),
        AlertCircle: ({ className = "w-5 h-5" }) => (
          <svg viewBox="0 0 20 20" fill="currentColor" className={className}>
            <path
              fillRule="evenodd"
              d="M10 18a8 8 0 100-16 8 8 0 000 16zM9 7a1 1 0 112 0v3a1 1 0 11-2 0V7zm1 8a1 1 0 100-2 1 1 0 000 2z"
              clipRule="evenodd"
            />
          </svg>
        ),
        CheckCircle2: ({ className = "w-5 h-5" }) => (
          <svg viewBox="0 0 20 20" fill="currentColor" className={className}>
            <path
              fillRule="evenodd"
              d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
              clipRule="evenodd"
            />
          </svg>
        ),
        Loader2: ({ className = "w-5 h-5" }) => (
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            strokeWidth="3"
            className={`animate-spin ${className}`}
          >
            <path d="M21 12a9 9 0 1 1-6.219-8.56" strokeLinecap="round" strokeLinejoin="round" />
          </svg>
        ),
      };

      async function fetchWithRetry(url, options, retries = 5) {
        const delays = [1000, 2000, 4000, 8000, 16000];

        for (let i = 0; i < retries; i += 1) {
          try {
            const response = await fetch(url, options);
            const data = await response.json().catch(() => ({}));

            if (!response.ok) {
              const error = new Error(data.error || `HTTP 错误: ${response.status}`);
              error.status = response.status;
              error.retryAfter = data.retryAfter;
              throw error;
            }

            return data;
          } catch (error) {
            const status = error?.status;
            const shouldRetry =
              status === undefined || status === 408 || status === 425 || status === 429 || status >= 500;

            if (i === retries - 1) {
              throw error;
            }

            if (!shouldRetry) {
              throw error;
            }

            if (status === 429) {
              throw new Error("请求过于频繁，当前已被 GitHub Models 限流，请稍后再试。");
            }

            await new Promise((resolve) => setTimeout(resolve, delays[i]));
          }
        }

        throw new Error("请求失败");
      }

      function extractJsonArray(text) {
        if (!text || typeof text !== "string") {
          throw new Error("模型没有返回文本结果");
        }

        const cleaned = text
          .replace(/^```json\s*/i, "")
          .replace(/^```\s*/i, "")
          .replace(/\s*```$/i, "")
          .trim();

        const firstBracket = cleaned.indexOf("[");
        const lastBracket = cleaned.lastIndexOf("]");

        if (firstBracket === -1 || lastBracket === -1 || lastBracket <= firstBracket) {
          throw new Error("模型返回的不是 JSON 数组");
        }

        return JSON.parse(cleaned.slice(firstBracket, lastBracket + 1));
      }

      function copyText(word) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          return navigator.clipboard.writeText(word);
        }

        return new Promise((resolve, reject) => {
          const textArea = document.createElement("textarea");
          textArea.value = word;
          document.body.appendChild(textArea);
          textArea.select();

          try {
            document.execCommand("copy");
            resolve();
          } catch (error) {
            reject(error);
          } finally {
            document.body.removeChild(textArea);
          }
        });
      }

      function loadSearchHistory() {
        try {
          const raw = localStorage.getItem(SEARCH_HISTORY_KEY);
          const parsed = raw ? JSON.parse(raw) : [];
          return Array.isArray(parsed) ? parsed : [];
        } catch {
          return [];
        }
      }

      function saveSearchHistory(items) {
        localStorage.setItem(SEARCH_HISTORY_KEY, JSON.stringify(items));
      }

      function App() {
        const [meaning, setMeaning] = useState("");
        const [spelling, setSpelling] = useState("");
        const [results, setResults] = useState([]);
        const [isLoading, setIsLoading] = useState(false);
        const [error, setError] = useState("");
        const [copiedWord, setCopiedWord] = useState("");
        const [searchHistory, setSearchHistory] = useState(() => loadSearchHistory());

        useEffect(() => {
          const script = document.createElement("script");
          script.async = true;
          script.src = "//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js";
          document.body.appendChild(script);

          return () => {
            document.body.removeChild(script);
          };
        }, []);

        const handleSearch = async (e) => {
          e.preventDefault();

          if (!meaning.trim() && !spelling.trim()) {
            setError("请输入中文含义或拼写片段（至少一项）。");
            return;
          }

          setIsLoading(true);
          setError("");
          setResults([]);

          const promptText = `
我正在努力回忆一个英文单词（话到嘴边想不起来，Tip of the tongue）。
请根据我提供的线索，帮我找出最有可能的英文单词。

中文含义/线索：${meaning.trim() || "未提供"}
拼写记忆/片段/首尾字母：${spelling.trim() || "未提供"}

要求：
1. 深度结合中文含义和拼写片段进行推理和模糊匹配。
2. 即使拼写片段有明显错误（如多字母、少字母、元音记错、发音相似但拼写错误），也请尽力寻找最符合含义的词。
3. 提供 5-10 个最有可能的单词，按可能性从高到低排序。
4. 只返回 JSON 数组，不要返回 markdown，不要加代码块，不要写额外解释。
5. 每个对象必须包含这些字段：word、translation、phonetic、reason、confidence。
6. confidence 必须是 0-100 的整数。
`;

          try {
            const data = await fetchWithRetry(API_URL, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                model: MODEL_NAME,
                systemPrompt:
                  "You are a precise English vocabulary retrieval assistant. Return valid JSON only. Do not use markdown fences. Output an array of candidate words.",
                prompt: promptText,
              }),
            });

            const parsedResults = extractJsonArray(data.content);
            setResults(parsedResults);
            updateSearchHistory(meaning.trim(), spelling.trim());
          } catch (err) {
            console.error(err);
            setError(err?.message || "搜索过程中出现问题，请稍后重试。");
          } finally {
            setIsLoading(false);
          }
        };

        const copyToClipboard = async (word) => {
          try {
            await copyText(word);
            setCopiedWord(word);
            setTimeout(() => setCopiedWord(""), 2000);
          } catch (err) {
            console.error("复制失败", err);
          }
        };

        const updateSearchHistory = (nextMeaning, nextSpelling) => {
          const historyItem = {
            meaning: nextMeaning,
            spelling: nextSpelling,
            label:
              [nextMeaning, nextSpelling].filter(Boolean).join(" + ") || "未命名搜索",
          };

          setSearchHistory((prev) => {
            const deduped = prev.filter(
              (item) => !(item.meaning === historyItem.meaning && item.spelling === historyItem.spelling)
            );
            const next = [historyItem, ...deduped].slice(0, 8);
            saveSearchHistory(next);
            return next;
          });
        };

        const applyHistoryItem = (item) => {
          setMeaning(item.meaning || "");
          setSpelling(item.spelling || "");
          setError("");
        };

        const clearHistory = () => {
          setSearchHistory([]);
          saveSearchHistory([]);
        };

        return (
          <div className="min-h-screen bg-[#F4EDE4] text-[#3A3431] font-sans selection:bg-[#CF6656] selection:text-white flex flex-col">
            <header className="w-full border-b border-[#E6DFD5]">
              <div className="max-w-7xl mx-auto px-4 md:px-8 py-5 flex items-center justify-between gap-4">
                <div className="flex items-center space-x-3">
                  <div className="w-10 h-10 bg-gradient-to-tr from-[#CF6656] to-[#DCA55A] text-white flex items-center justify-center rounded-[12px] shadow-[0_8px_16px_-6px_rgba(207,102,86,0.4)]">
                    <SolidIcon.Dictionary className="w-5 h-5" />
                  </div>
                  <div>
                    <h1 className="text-xl md:text-2xl font-extrabold tracking-tight text-[#3A3431]">
                      单词唤醒
                    </h1>
                    <p className="text-sm text-[#8E867E] mt-1 hidden md:block">
                      帮你从模糊线索里找回那个卡在嘴边的单词
                    </p>
                  </div>
                </div>
                <span className="text-xs font-semibold text-[#8E867E] tracking-[0.25em] uppercase shrink-0">
                  Word Finder
                </span>
              </div>
            </header>

            <main className="flex-1 w-full">
              <div className="max-w-7xl mx-auto px-4 md:px-8 py-6 md:py-10 grid grid-cols-1 xl:grid-cols-[380px_minmax(0,1fr)] gap-8 xl:gap-10 items-start">
                <aside className="xl:sticky xl:top-8 space-y-6">
                  <div className="bg-[#FBF9F6] border border-[#E6DFD5] p-6 md:p-8 rounded-[24px] shadow-[0_20px_40px_-15px_rgba(58,52,49,0.05)]">
                    <div className="flex items-center gap-3 mb-6">
                      <div className="w-10 h-10 rounded-2xl bg-[#F4EDE4] text-[#CF6656] flex items-center justify-center">
                        <SolidIcon.Sparkles className="w-5 h-5" />
                      </div>
                      <div>
                        <h2 className="text-lg font-bold">输入线索</h2>
                        <p className="text-sm text-[#8E867E]">中文含义和拼写片段至少填写一项</p>
                      </div>
                    </div>

                    <form onSubmit={handleSearch} className="space-y-6">
                      <div className="space-y-2">
                        <label className="text-xs font-bold text-[#8E867E] tracking-wider uppercase pl-1 block">
                          中文含义
                        </label>
                        <input
                          type="text"
                          value={meaning}
                          onChange={(e) => setMeaning(e.target.value)}
                          placeholder="例如：尴尬、犹豫"
                          className="w-full bg-[#F4EDE4] border border-transparent px-4 py-3 rounded-[16px] focus:bg-white focus:border-[#DCA55A] focus:ring-4 focus:ring-[#DCA55A]/10 transition-all outline-none text-[#3A3431] placeholder-[#BDB4AA] text-base font-medium"
                        />
                      </div>

                      <div className="space-y-2">
                        <label className="text-xs font-bold text-[#8E867E] tracking-wider uppercase pl-1 block">
                          拼写片段
                        </label>
                        <input
                          type="text"
                          value={spelling}
                          onChange={(e) => setSpelling(e.target.value)}
                          placeholder="例如：awk、h...te"
                          className="w-full bg-[#F4EDE4] border border-transparent px-4 py-3 rounded-[16px] focus:bg-white focus:border-[#DCA55A] focus:ring-4 focus:ring-[#DCA55A]/10 transition-all outline-none text-[#3A3431] placeholder-[#BDB4AA] text-base font-medium"
                        />
                      </div>

                      {error && (
                        <div className="flex items-center space-x-3 text-[#CF6656] bg-[#CF6656]/10 px-5 py-3 rounded-[16px] text-sm font-semibold">
                          <SolidIcon.AlertCircle className="w-4 h-4 shrink-0" />
                          <span>{error}</span>
                        </div>
                      )}

                      <button
                        type="submit"
                        disabled={isLoading}
                        className="w-full py-4 bg-[#3A3431] text-[#FBF9F6] font-bold tracking-wide rounded-full hover:bg-[#282421] transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center space-x-2 shadow-[0_12px_24px_-8px_rgba(58,52,49,0.3)] active:scale-[0.98]"
                      >
                        {isLoading ? (
                          <>
                            <SolidIcon.Loader2 className="w-5 h-5" />
                            <span>检索记忆网络...</span>
                          </>
                        ) : (
                          <>
                            <SolidIcon.Search className="w-5 h-5" />
                            <span>唤醒记忆</span>
                          </>
                        )}
                      </button>
                    </form>
                  </div>

                  <div className="bg-[#FBF9F6] border border-[#E6DFD5] rounded-[24px] p-6 shadow-[0_20px_40px_-15px_rgba(58,52,49,0.04)]">
                    <div className="flex items-center justify-between gap-3 mb-4">
                      <div className="flex items-center gap-3">
                        <div className="w-10 h-10 rounded-2xl bg-[#F4EDE4] text-[#DCA55A] flex items-center justify-center">
                          <SolidIcon.BookOpen className="w-5 h-5" />
                        </div>
                        <div>
                          <h3 className="font-bold">搜索历史</h3>
                          <p className="text-sm text-[#8E867E]">保留最近 8 条成功搜索</p>
                        </div>
                      </div>
                      {searchHistory.length > 0 && (
                        <button
                          type="button"
                          onClick={clearHistory}
                          className="text-xs font-semibold text-[#8E867E] hover:text-[#CF6656] transition-colors"
                        >
                          清空
                        </button>
                      )}
                    </div>

                    {searchHistory.length > 0 ? (
                      <div className="flex flex-col gap-3">
                        {searchHistory.map((item, index) => (
                          <button
                            key={`${item.meaning}-${item.spelling}-${index}`}
                            type="button"
                            className="px-4 py-3 bg-white border border-[#E6DFD5] text-[#3A3431] hover:border-[#CF6656] transition-colors rounded-[18px] shadow-sm text-left"
                            onClick={() => applyHistoryItem(item)}
                          >
                            <div className="text-sm font-semibold leading-relaxed">{item.label}</div>
                          </button>
                        ))}
                      </div>
                    ) : (
                      <div className="rounded-[18px] border border-dashed border-[#E6DFD5] bg-white/60 px-4 py-5 text-sm text-[#8E867E] leading-relaxed">
                        暂时还没有搜索历史。成功搜索后，这里会记录你最近的检索内容，方便再次尝试。
                      </div>
                    )}
                  </div>
                </aside>

                <section className="min-w-0">
                  {results.length > 0 ? (
                    <div className="space-y-5">
                      <div className="flex items-center justify-between px-1 pb-2">
                        <div>
                          <h2 className="text-sm font-extrabold tracking-wider text-[#3A3431] uppercase">
                            匹配结果
                          </h2>
                          <p className="text-sm text-[#8E867E] mt-2">
                            根据你的语义线索和模糊拼写，筛出最可能的候选词。
                          </p>
                        </div>
                        <span className="text-xs font-bold text-[#8E867E] bg-[#E6DFD5] px-2 py-1 rounded-full">
                          {results.length}
                        </span>
                      </div>

                      <div className="space-y-4">
                        {results.map((item, index) => (
                          <div
                            key={`${item.word}-${index}`}
                            className="group bg-[#FBF9F6] p-6 md:p-8 rounded-[24px] border border-[#E6DFD5] hover:border-[#DCA55A]/50 hover:shadow-[0_20px_40px_-15px_rgba(220,165,90,0.15)] transition-all relative flex flex-col lg:flex-row gap-6 justify-between items-start lg:items-center overflow-hidden"
                          >
                            <div
                              className="absolute top-0 left-0 h-1 bg-gradient-to-r from-[#CF6656] to-[#DCA55A] opacity-80"
                              style={{ width: `${item.confidence || 0}%` }}
                            />

                            <div className="space-y-2 flex-1 pr-0">
                              <div className="flex flex-wrap items-baseline gap-x-3 gap-y-1">
                                <h3 className="text-3xl font-extrabold text-[#3A3431] tracking-tight">
                                  {item.word}
                                </h3>
                                <span className="text-[#8E867E] font-mono text-sm">
                                  /{item.phonetic || "-"}/
                                </span>
                              </div>
                              <p className="text-lg font-semibold text-[#CF6656] tracking-tight">
                                {item.translation}
                              </p>
                              <p className="text-sm text-[#8E867E] font-medium leading-relaxed pt-2">
                                {item.reason}
                              </p>
                            </div>

                            <div className="w-full lg:w-auto flex flex-row lg:flex-col items-center justify-between gap-4 mt-2 lg:mt-0 pt-4 lg:pt-0 border-t border-[#E6DFD5] lg:border-t-0">
                              <div className="flex flex-col items-start lg:items-end">
                                <span className="text-[10px] font-bold text-[#8E867E] uppercase tracking-widest mb-0.5">
                                  契合度
                                </span>
                                <span className="text-xl font-black text-[#3A3431]">
                                  {item.confidence}%
                                </span>
                              </div>

                              <button
                                type="button"
                                onClick={() => copyToClipboard(item.word)}
                                className={`px-5 py-2.5 rounded-full transition-all font-bold text-sm flex items-center justify-center space-x-1.5 ${
                                  copiedWord === item.word
                                    ? "bg-[#E6DFD5] text-[#3A3431]"
                                    : "bg-white border border-[#E6DFD5] text-[#3A3431] hover:bg-[#F4EDE4] active:scale-95"
                                }`}
                              >
                                {copiedWord === item.word ? (
                                  <>
                                    <SolidIcon.CheckCircle2 className="w-4 h-4" />
                                    <span>已复制</span>
                                  </>
                                ) : (
                                  <span>复制</span>
                                )}
                              </button>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  ) : (
                    <div className="bg-[#FBF9F6] border border-dashed border-[#E6DFD5] rounded-[24px] p-8 md:p-12 min-h-[420px] flex flex-col items-center justify-center text-center shadow-[0_20px_40px_-15px_rgba(58,52,49,0.03)]">
                      <div className="w-14 h-14 rounded-2xl bg-[#F4EDE4] text-[#CF6656] flex items-center justify-center mb-5">
                        <SolidIcon.Search className="w-6 h-6" />
                      </div>
                      <h2 className="text-2xl font-extrabold tracking-tight">等待你的线索</h2>
                      <p className="mt-3 max-w-xl text-[#8E867E] leading-relaxed">
                        输入中文含义、拼写片段，或者两者一起输入。桌面端会把检索结果展示在这里，方便你连续试错和对比候选词。
                      </p>
                    </div>
                  )}
                </section>
              </div>
            </main>

            <footer className="w-full border-t border-[#E6DFD5] mt-8">
              <div className="max-w-7xl mx-auto px-4 md:px-8 py-8 text-center space-y-3">
                <p className="text-sm text-[#8E867E] font-medium tracking-wide">
                  由{" "}
                  <a
                    href="https://github.com/Ahhhh2016"
                    target="_blank"
                    rel="noopener noreferrer"
                    className="text-[#CF6656] hover:text-[#DCA55A] transition-colors font-bold underline decoration-[#CF6656]/30 underline-offset-4"
                  >
                    Ahhhh2016
                  </a>{" "}
                  制作，希望这个小工具对你有帮助
                </p>
                <p className="text-xs text-[#BDB4AA] font-medium tracking-wide">
                  使用 Github Models 免费模型，有使用限制
                </p>
              </div>
            </footer>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
